name = "mcp-api-worker"
main = "src/index.ts"
compatibility_date = "2024-11-05"

# IMPORTANT: Always deploy with explicit config flag to preserve bindings!
# Use: npx wrangler deploy -c wrangler.toml
# DO NOT deploy from Cloudflare dashboard or bindings will be lost!

# Routes - Define which URLs trigger this worker
# This Worker serves support APIs and snapshot endpoints only.
# NOTE: top-level keys (like `routes`) MUST come before any [[table]] headers,
# otherwise TOML parses them into the last section (causes wrangler warning).
routes = [
  { pattern = "mcpfinder.dev/api/*", zone_name = "mcpfinder.dev" }  # Support + snapshot API endpoints
]

# Pre-built SQLite snapshot served at /api/v1/snapshot/*
# Populated by scripts/build-snapshot.mjs (via CI cron).
# Create with: npx wrangler r2 bucket create mcp-finder-db-snapshots
[[r2_buckets]]
binding = "MCP_DB_SNAPSHOTS"
bucket_name = "mcp-finder-db-snapshots"
preview_bucket_name = "mcp-finder-db-snapshots"

# Observability - Enable logging and analytics
[observability]
enabled = true
