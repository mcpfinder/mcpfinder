# Cloudflare Worker (static assets) for the mcpfinder.dev landing page.
#
# To deploy as a preview on workers.dev:
#   cd landing && npx wrangler deploy
#
# To cut over from the existing `mcpfinder-landing` Cloudflare Pages project:
#   1. Detach `mcpfinder.dev` custom domain from the Pages project in CF dash.
#   2. Uncomment the `routes` block below.
#   3. Run `npx wrangler deploy` again.

name = "mcpfinder-landing-www"
compatibility_date = "2024-11-05"

# mcpfinder.dev is bound to this worker as a Cloudflare Custom Domain
# (Workers & Pages → mcpfinder-landing-www → Custom Domains).
# Do NOT also set it as a `routes` entry here — that creates a duplicate
# binding. Custom Domain catches the hostname; Routes on sibling workers
# with more specific patterns still preempt it (e.g. api-worker owns
# mcpfinder.dev/api/* and serves /api/v1/snapshot/*). Custom Domain +
# specific Routes coexist cleanly.

[assets]
directory = "./public"

[observability]
enabled = true
